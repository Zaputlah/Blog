<header class="sticky top-0 z-40 border-b border-[#dfe8e3] bg-white/95 backdrop-blur">
  <nav class="page-container py-3">
    <div class="flex items-center justify-between gap-4">
      <a routerLink="/beranda" class="flex shrink-0 items-center" (click)="closeMobileMenu()">
        <span class="flex h-16 w-36 shrink-0 items-center justify-start md:h-20 md:w-44">
          <img src="zaputlah.png" alt="Zaputlah" class="h-full w-full object-contain" />
        </span>
      </a>

      <div class="hidden items-center gap-1 md:flex">
        <a
          routerLink="/beranda"
          routerLinkActive="bg-[#f3f8f5] text-[#123d34]"
          class="rounded-lg px-4 py-2 text-sm font-semibold text-[#52645f] transition hover:bg-[#f7faf8] hover:text-[#123d34]"
        >
          Beranda
        </a>
        <a
          routerLink="/artikel"
          routerLinkActive="bg-[#f3f8f5] text-[#123d34]"
          class="rounded-lg px-4 py-2 text-sm font-semibold text-[#52645f] transition hover:bg-[#f7faf8] hover:text-[#123d34]"
        >
          Artikel
        </a>
        <a
          routerLink="/kajian"
          routerLinkActive="bg-[#f3f8f5] text-[#123d34]"
          class="rounded-lg px-4 py-2 text-sm font-semibold text-[#52645f] transition hover:bg-[#f7faf8] hover:text-[#123d34]"
        >
          Kajian
        </a>
        <a
          routerLink="/poster"
          routerLinkActive="bg-[#f3f8f5] text-[#123d34]"
          class="rounded-lg px-4 py-2 text-sm font-semibold text-[#52645f] transition hover:bg-[#f7faf8] hover:text-[#123d34]"
        >
          Poster
        </a>
        <a
          routerLink="/quran"
          routerLinkActive="bg-[#f3f8f5] text-[#123d34]"
          class="rounded-lg px-4 py-2 text-sm font-semibold text-[#52645f] transition hover:bg-[#f7faf8] hover:text-[#123d34]"
        >
          Al-Quran
        </a>
      </div>

      <div class="flex items-center gap-2">
        <button
          type="button"
          (click)="toggleTheme()"
          class="theme-toggle"
          [attr.aria-label]="isDarkMode ? 'Aktifkan mode terang' : 'Aktifkan mode gelap'"
          [attr.title]="isDarkMode ? 'Mode terang' : 'Mode gelap'"
          [attr.aria-pressed]="isDarkMode"
        >
          <svg
            *ngIf="!isDarkMode"
            class="h-5 w-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
            ></path>
          </svg>
          <svg
            *ngIf="isDarkMode"
            class="h-5 w-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.36 6.36-1.42-1.42M7.05 7.05 5.64 5.64m12.72 0-1.42 1.41M7.05 16.95l-1.41 1.41M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0z"
            ></path>
          </svg>
        </button>

        <button
          type="button"
          (click)="toggleMobileMenu()"
          class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-[#dfe8e3] text-[#123d34] transition hover:bg-[#f7faf8] md:hidden"
          aria-label="Buka menu"
        >
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              [attr.d]="isMobileMenuOpen ? 'M6 18L18 6M6 6l12 12' : 'M4 7h16M4 12h16M4 17h16'"
            ></path>
          </svg>
        </button>
      </div>
    </div>

    <div *ngIf="isMobileMenuOpen" class="mt-3 grid gap-1 border-t border-[#dfe8e3] pt-3 md:hidden">
      <a
        routerLink="/beranda"
        routerLinkActive="bg-[#f3f8f5] text-[#123d34]"
        class="rounded-lg px-3 py-2 text-sm font-semibold text-[#52645f]"
        (click)="closeMobileMenu()"
      >
        Beranda
      </a>
      <a
        routerLink="/artikel"
        routerLinkActive="bg-[#f3f8f5] text-[#123d34]"
        class="rounded-lg px-3 py-2 text-sm font-semibold text-[#52645f]"
        (click)="closeMobileMenu()"
      >
        Artikel
      </a>
      <a
        routerLink="/kajian"
        routerLinkActive="bg-[#f3f8f5] text-[#123d34]"
        class="rounded-lg px-3 py-2 text-sm font-semibold text-[#52645f]"
        (click)="closeMobileMenu()"
      >
        Kajian
      </a>
      <a
        routerLink="/poster"
        routerLinkActive="bg-[#f3f8f5] text-[#123d34]"
        class="rounded-lg px-3 py-2 text-sm font-semibold text-[#52645f]"
        (click)="closeMobileMenu()"
      >
        Poster
      </a>
      <a
        routerLink="/quran"
        routerLinkActive="bg-[#f3f8f5] text-[#123d34]"
        class="rounded-lg px-3 py-2 text-sm font-semibold text-[#52645f]"
        (click)="closeMobileMenu()"
      >
        Al-Quran
      </a>
      <button type="button" (click)="toggleTheme()" class="theme-toggle-mobile">
        {{ isDarkMode ? 'Mode Terang' : 'Mode Gelap' }}
      </button>
    </div>
  </nav>
</header>
